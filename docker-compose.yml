services:
  postgres:
    image: postgres:17-alpine
    container_name: alix-prototype-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alix
      POSTGRES_PASSWORD: alix
      POSTGRES_DB: alix
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alix -d alix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
