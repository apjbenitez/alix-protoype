<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Admin Dashboard - prototype</title>
  <link rel="stylesheet" href="../vendor/proto-defaults.css" />
  <link rel="stylesheet" href="../vendor/alix-ui.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31/dist/ag-grid-community.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    /* proto-defaults.css provides reset, body styles, and --ap-* tokens */
    body { min-height: 100vh; }

    .design-badge {
      position: fixed; bottom: var(--ap-space-3); right: var(--ap-space-3);
      font: 600 11px/1 system-ui; padding: 6px 10px;
      background: var(--ap-text); color: var(--ap-bg-surface); border-radius: 999px;
      z-index: 1000;
    }
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--ap-space-8) var(--ap-space-6);
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--ap-space-8);
    }
    .dashboard-header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }
    .dashboard-header-actions {
      display: flex;
      gap: var(--ap-space-3);
    }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--ap-space-5);
      margin-bottom: var(--ap-space-8);
    }
    .metric-card {
      background: var(--ap-bg-surface);
      border-radius: var(--ap-radius-lg);
      padding: var(--ap-space-6);
      border: 1px solid var(--ap-border-soft);
    }
    .metric-label {
      font-size: 13px;
      color: var(--ap-text-muted);
      margin-bottom: var(--ap-space-2);
      display: flex;
      align-items: center;
      gap: var(--ap-space-2);
    }
    .metric-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: var(--ap-space-2);
    }
    .metric-change {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: var(--ap-space-1);
    }
    .metric-change.positive { color: var(--ap-success); }
    .metric-change.negative { color: var(--ap-error); }
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--ap-space-5);
      margin-bottom: var(--ap-space-8);
    }
    .card {
      background: var(--ap-bg-surface);
      border-radius: var(--ap-radius-lg);
      padding: var(--ap-space-6);
      border: 1px solid var(--ap-border-soft);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--ap-space-5);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .chart-placeholder {
      height: 280px;
      background: linear-gradient(180deg, rgba(2,72,112,0.08) 0%, rgba(2,72,112,0.02) 100%);
      border-radius: var(--ap-radius-lg);
      display: flex;
      align-items: flex-end;
      padding: 0 var(--ap-space-2) var(--ap-space-2);
      gap: var(--ap-space-1);
    }
    .chart-bar {
      flex: 1;
      background: linear-gradient(180deg, var(--ap-primary) 0%, var(--ap-primary-2) 100%);
      border-radius: var(--ap-radius) var(--ap-radius) 0 0;
      min-height: 20px;
      transition: opacity 0.15s;
    }
    .chart-bar:hover {
      opacity: 0.85;
    }
    .activity-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: var(--ap-space-3);
      padding: var(--ap-space-3) 0;
      border-bottom: 1px solid var(--ap-border-soft);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--ap-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .activity-icon.deposit { background: var(--ap-success-bg); color: var(--ap-success); }
    .activity-icon.withdrawal { background: var(--ap-error-bg); color: var(--ap-error); }
    .activity-icon.transfer { background: rgba(2,72,112,0.12); color: var(--ap-primary); }
    .activity-details { flex: 1; }
    .activity-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .activity-meta {
      font-size: 12px;
      color: var(--ap-text-muted);
    }
    .activity-amount {
      font-size: 14px;
      font-weight: 600;
    }
    .activity-amount.positive { color: var(--ap-success); }
    .activity-amount.negative { color: var(--ap-error); }
    .user-cell {
      display: flex;
      align-items: center;
      gap: var(--ap-space-2);
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ap-primary) 0%, var(--ap-primary-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }
    .filters-row {
      display: flex;
      gap: var(--ap-space-3);
      margin-bottom: var(--ap-space-4);
      align-items: center;
    }
    .search-input {
      padding: var(--ap-space-2) var(--ap-space-3);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius-md);
      font-size: 14px;
      width: 280px;
      font-family: var(--ap-font);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--ap-primary);
    }
    .tab-nav {
      display: flex;
      gap: var(--ap-space-1);
      margin-bottom: var(--ap-space-4);
      border-bottom: 1px solid var(--ap-border-soft);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: var(--ap-space-2) var(--ap-space-4);
      border: none;
      background: transparent;
      font-size: 14px;
      cursor: pointer;
      color: var(--ap-text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: var(--ap-font);
    }
    .tab-btn.active {
      color: var(--ap-primary);
      border-bottom-color: var(--ap-primary);
    }
    .tab-btn:hover { color: var(--ap-text); }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: var(--ap-space-1) var(--ap-space-2);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.success { background: var(--ap-success-bg); color: var(--ap-success-2); }
    .status-badge.warning { background: var(--ap-warning-bg); color: var(--ap-warning); }
    .status-badge.error { background: var(--ap-error-bg); color: var(--ap-error-2); }
    .info-banner {
      display: flex;
      align-items: center;
      gap: var(--ap-space-2);
      background: var(--ap-warning-bg);
      border: 1px solid var(--ap-warning);
      border-radius: var(--ap-radius-lg);
      padding: var(--ap-space-3) var(--ap-space-4);
      margin-bottom: var(--ap-space-6);
      font-size: 14px;
      color: var(--ap-warning);
    }
    .info-banner-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .info-banner a {
      color: inherit;
      font-weight: 600;
      margin-left: auto;
    }
    .export-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--ap-space-3);
      margin-bottom: var(--ap-space-5);
    }
    .export-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--ap-space-2);
      padding: var(--ap-space-5) var(--ap-space-4);
      border: 2px solid var(--ap-border-soft);
      border-radius: var(--ap-radius-lg);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--ap-bg-surface);
    }
    .export-option:hover {
      border-color: var(--ap-primary);
      background: var(--ap-bg-subtle);
    }
    .export-option.selected {
      border-color: var(--ap-primary);
      background: var(--ap-bg-subtle);
    }
    .export-icon {
      width: 32px;
      height: 32px;
      color: var(--ap-text-2);
    }
    .export-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--ap-text);
    }
    .modal-actions {
      display: flex;
      gap: var(--ap-space-3);
      justify-content: flex-end;
      margin-top: var(--ap-space-5);
    }
    .form-group {
      margin-bottom: var(--ap-space-4);
    }
    .form-label {
      display: block;
      margin-bottom: var(--ap-space-2);
      font-size: 14px;
      font-weight: 500;
      color: var(--ap-text);
    }
    .form-input {
      width: 100%;
      padding: var(--ap-space-2) var(--ap-space-3);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius-md);
      font-size: 14px;
      font-family: var(--ap-font);
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--ap-primary);
      box-shadow: 0 0 0 3px rgba(2,72,112,0.1);
    }
    .form-select {
      width: 100%;
      padding: var(--ap-space-2) var(--ap-space-3);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius-md);
      font-size: 14px;
      font-family: var(--ap-font);
      background: var(--ap-bg-surface);
      cursor: pointer;
      box-sizing: border-box;
    }
    .form-select:focus {
      outline: none;
      border-color: var(--ap-primary);
      box-shadow: 0 0 0 3px rgba(2,72,112,0.1);
    }

    @media (max-width: 900px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .export-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .dashboard-container {
        padding: var(--ap-space-4);
      }
      .dashboard-header {
        flex-direction: column;
        gap: var(--ap-space-4);
        align-items: stretch;
      }
      .dashboard-header-actions {
        flex-direction: column;
      }
      .dashboard-header-actions button {
        width: 100%;
      }
      .metrics-grid {
        grid-template-columns: 1fr;
        gap: var(--ap-space-3);
      }
      .metric-card {
        padding: var(--ap-space-4);
      }
      .metric-value {
        font-size: 26px;
      }
      .card {
        padding: 16px;
      }
      .tab-nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab-btn {
        white-space: nowrap;
        padding: 8px 12px;
      }
      .filters-row {
        flex-direction: column;
        align-items: stretch;
      }
      .search-input {
        width: 100%;
      }
      .info-banner {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .info-banner a {
        margin-left: 0;
      }
    }

    @media (max-width: 400px) {
      .dashboard-container {
        padding: 12px;
      }
      .dashboard-header h1 {
        font-size: 22px;
      }
      .metric-value {
        font-size: 22px;
      }
      .card {
        padding: 12px;
      }
      .chart-placeholder {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="design-badge">Finance Admin - prototype</div>

  <script type="text/babel" data-type="module" data-presets="react">
    import { React, createRoot, NavBar, Button, Tag, AgGrid, Dialog } from "../vendor/alix-ui.js";

    const { useState, useMemo } = React;

    const mockTransactions = [
      { id: "TXN-001247", user: "Maria Garcia", email: "maria.garcia@email.com", type: "Deposit", amount: 5000.00, status: "Completed", date: "2026-05-18 14:32" },
      { id: "TXN-001246", user: "Carlos Lopez", email: "carlos.lopez@email.com", type: "Withdrawal", amount: -1200.00, status: "Completed", date: "2026-05-18 13:15" },
      { id: "TXN-001245", user: "Ana Martinez", email: "ana.martinez@email.com", type: "Transfer", amount: -800.00, status: "Pending", date: "2026-05-18 12:45" },
      { id: "TXN-001244", user: "Pedro Sanchez", email: "pedro.sanchez@email.com", type: "Deposit", amount: 15000.00, status: "Completed", date: "2026-05-18 11:20" },
      { id: "TXN-001243", user: "Laura Fernandez", email: "laura.fernandez@email.com", type: "Withdrawal", amount: -3500.00, status: "Failed", date: "2026-05-18 10:50" },
      { id: "TXN-001242", user: "Diego Ruiz", email: "diego.ruiz@email.com", type: "Transfer", amount: -2000.00, status: "Completed", date: "2026-05-18 09:30" },
      { id: "TXN-001241", user: "Sofia Torres", email: "sofia.torres@email.com", type: "Deposit", amount: 8500.00, status: "Pending", date: "2026-05-17 18:45" },
      { id: "TXN-001240", user: "Miguel Herrera", email: "miguel.herrera@email.com", type: "Withdrawal", amount: -500.00, status: "Completed", date: "2026-05-17 16:20" },
      { id: "TXN-001239", user: "Carmen Diaz", email: "carmen.diaz@email.com", type: "Deposit", amount: 12000.00, status: "Completed", date: "2026-05-17 14:10" },
      { id: "TXN-001238", user: "Roberto Morales", email: "roberto.morales@email.com", type: "Transfer", amount: -4500.00, status: "Completed", date: "2026-05-17 11:55" },
      { id: "TXN-001237", user: "Elena Vargas", email: "elena.vargas@email.com", type: "Deposit", amount: 3200.00, status: "Pending", date: "2026-05-17 09:30" },
      { id: "TXN-001236", user: "Javier Castro", email: "javier.castro@email.com", type: "Withdrawal", amount: -7800.00, status: "Failed", date: "2026-05-16 17:40" },
    ];

    const columnDefs = [
      {
        field: "id",
        headerName: "ID",
        width: 120,
        cellRenderer: (params) => `<code style="font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: var(--ap-text-2); background: var(--ap-bg-muted); padding: 2px 8px; border-radius: var(--ap-radius);">${params.value}</code>`
      },
      {
        field: "user",
        headerName: "User",
        flex: 1,
        minWidth: 200,
        cellRenderer: (params) => {
          const initials = params.value.split(' ').map(n => n[0]).join('');
          return `<div class="user-cell">
            <div class="user-avatar">${initials}</div>
            <div>
              <div style="font-weight: 500;">${params.value}</div>
              <div style="font-size: 12px; color: var(--ap-text-muted);">${params.data.email}</div>
            </div>
          </div>`;
        }
      },
      { field: "type", headerName: "Type", width: 120 },
      {
        field: "amount",
        headerName: "Amount",
        width: 140,
        type: "rightAligned",
        cellRenderer: (params) => {
          const color = params.value >= 0 ? 'var(--ap-success)' : 'var(--ap-error)';
          const sign = params.value >= 0 ? '+' : '';
          return `<span style="font-weight: 600; color: ${color};">${sign}$${Math.abs(params.value).toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>`;
        }
      },
      {
        field: "status",
        headerName: "Status",
        width: 130,
        cellRenderer: (params) => {
          const statusMap = {
            Completed: { label: 'Completed', cls: 'success' },
            Pending: { label: 'Pending', cls: 'warning' },
            Failed: { label: 'Failed', cls: 'error' }
          };
          const s = statusMap[params.value];
          return `<span class="status-badge ${s.cls}">${s.label}</span>`;
        }
      },
      { field: "date", headerName: "Date", width: 160 },
    ];

    function WarningIcon() {
      return (
        <svg className="info-banner-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fillRule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clipRule="evenodd" />
        </svg>
      );
    }

    function MetricCard({ label, value, change, positive }) {
      return (
        <div className="metric-card">
          <div className="metric-label">{label}</div>
          <div className="metric-value">{value}</div>
          <div className={`metric-change ${positive ? 'positive' : 'negative'}`}>
            {positive ? '↑' : '↓'} {change}
          </div>
        </div>
      );
    }

    function RevenueChart() {
      const data = [
        { month: 'Jan', value: 680 },
        { month: 'Feb', value: 720 },
        { month: 'Mar', value: 650 },
        { month: 'Apr', value: 810 },
        { month: 'May', value: 760 },
        { month: 'Jun', value: 890 },
        { month: 'Jul', value: 750 },
        { month: 'Aug', value: 920 },
        { month: 'Sep', value: 800 },
        { month: 'Oct', value: 870 },
        { month: 'Nov', value: 840 },
        { month: 'Dec', value: 950 },
      ];
      const maxValue = Math.max(...data.map(d => d.value));

      return (
        <div>
          <div className="chart-placeholder">
            {data.map((item) => (
              <div
                key={item.month}
                className="chart-bar"
                style={{ height: `${(item.value / maxValue) * 100}%` }}
                title={`${item.month}: $${item.value}K`}
              />
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 11, color: '#727272' }}>
            {data.map(d => <span key={d.month}>{d.month}</span>)}
          </div>
        </div>
      );
    }

    function RecentActivity() {
      const activities = [
        { type: 'deposit', title: 'Deposit received', user: 'Maria Garcia', amount: '+$5,000.00', positive: true, time: '2 min ago' },
        { type: 'withdrawal', title: 'Withdrawal processed', user: 'Carlos Lopez', amount: '-$1,200.00', positive: false, time: '15 min ago' },
        { type: 'transfer', title: 'Transfer sent', user: 'Ana Martinez', amount: '-$800.00', positive: false, time: '1 hour ago' },
        { type: 'deposit', title: 'Deposit received', user: 'Pedro Sanchez', amount: '+$15,000.00', positive: true, time: '2 hours ago' },
        { type: 'withdrawal', title: 'Withdrawal failed', user: 'Laura Fernandez', amount: '-$3,500.00', positive: false, time: '3 hours ago' },
      ];

      const icons = {
        deposit: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>,
        withdrawal: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>,
        transfer: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 16l-4-4m0 0l4-4m-4 4h18M17 8l4 4m0 0l-4 4m4-4H3"/></svg>,
      };

      return (
        <ul className="activity-list">
          {activities.map((activity, i) => (
            <li key={i} className="activity-item">
              <div className={`activity-icon ${activity.type}`}>
                {icons[activity.type]}
              </div>
              <div className="activity-details">
                <div className="activity-title">{activity.title}</div>
                <div className="activity-meta">{activity.user} - {activity.time}</div>
              </div>
              <div className={`activity-amount ${activity.positive ? 'positive' : 'negative'}`}>
                {activity.amount}
              </div>
            </li>
          ))}
        </ul>
      );
    }

    function ExportModal({ open, onClose }) {
      const [selected, setSelected] = useState('excel');

      if (!open) return null;

      return (
        <Dialog open={open} onClose={onClose} title="Export Report">
          <p style={{ marginBottom: 16, color: '#6b7280', fontSize: 14 }}>
            Select your preferred export format for the transactions report.
          </p>
          <div className="export-grid">
            <div
              className={`export-option ${selected === 'excel' ? 'selected' : ''}`}
              onClick={() => setSelected('excel')}
            >
              <svg className="export-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 9h-2v2h2v2h-2v2H9v-2H7v-2h2v-2H7V9h2V7h2v2h2v2z"/>
              </svg>
              <span className="export-label">Excel</span>
            </div>
            <div
              className={`export-option ${selected === 'pdf' ? 'selected' : ''}`}
              onClick={() => setSelected('pdf')}
            >
              <svg className="export-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM9 16H7v-2h2v2zm0-4H7v-2h2v2zm4 4h-2v-2h2v2zm0-4h-2v-2h2v2z"/>
              </svg>
              <span className="export-label">PDF</span>
            </div>
            <div
              className={`export-option ${selected === 'csv' ? 'selected' : ''}`}
              onClick={() => setSelected('csv')}
            >
              <svg className="export-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 11h-2v4H9v-4H7v-2h6v2z"/>
              </svg>
              <span className="export-label">CSV</span>
            </div>
          </div>
          <div className="modal-actions">
            <Button variant="secondary" onClick={onClose}>Cancel</Button>
            <Button onClick={onClose}>Export</Button>
          </div>
        </Dialog>
      );
    }

    function NewTransactionModal({ open, onClose }) {
      const [formData, setFormData] = useState({ type: '', user: '', amount: '' });

      if (!open) return null;

      return (
        <Dialog open={open} onClose={onClose} title="New Transaction">
          <div className="form-group">
            <label className="form-label">Type</label>
            <select
              className="form-select"
              value={formData.type}
              onChange={(e) => setFormData({...formData, type: e.target.value})}
            >
              <option value="">Select type...</option>
              <option value="deposit">Deposit</option>
              <option value="withdrawal">Withdrawal</option>
              <option value="transfer">Transfer</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">User</label>
            <input
              type="text"
              className="form-input"
              placeholder="Enter user name or email..."
              value={formData.user}
              onChange={(e) => setFormData({...formData, user: e.target.value})}
            />
          </div>
          <div className="form-group">
            <label className="form-label">Amount</label>
            <input
              type="number"
              className="form-input"
              placeholder="0.00"
              value={formData.amount}
              onChange={(e) => setFormData({...formData, amount: e.target.value})}
            />
          </div>
          <div className="modal-actions">
            <Button variant="secondary" onClick={onClose}>Cancel</Button>
            <Button onClick={onClose}>Create Transaction</Button>
          </div>
        </Dialog>
      );
    }

    function Dashboard() {
      const [exportDialogOpen, setExportDialogOpen] = useState(false);
      const [newTxDialogOpen, setNewTxDialogOpen] = useState(false);
      const [searchValue, setSearchValue] = useState('');
      const [activeTab, setActiveTab] = useState('all');

      const filteredTransactions = useMemo(() => {
        return mockTransactions.filter(tx => {
          const matchesSearch = !searchValue ||
            tx.user.toLowerCase().includes(searchValue.toLowerCase()) ||
            tx.id.toLowerCase().includes(searchValue.toLowerCase());
          const matchesTab = activeTab === 'all' || tx.status.toLowerCase() === activeTab;
          return matchesSearch && matchesTab;
        });
      }, [searchValue, activeTab]);

      return (
        <>
          <NavBar
            projectName="FinanceApp"
            activeMenuItemHref="#dashboard"
            menuItems={[
              { label: "Dashboard", href: "#dashboard" },
              { label: "Users", href: "#users" },
              { label: "Transactions", href: "#transactions" },
              { label: "Reports", href: "#reports" },
              { label: "Settings", href: "#settings" },
            ]}
          />
          <main className="dashboard-container">
            <div className="info-banner">
              <WarningIcon />
              <span><strong>Attention:</strong> You have 3 pending transactions that need review.</span>
              <a href="#pending">Review now</a>
            </div>

            <div className="dashboard-header">
              <h1>Dashboard</h1>
              <div className="dashboard-header-actions">
                <Button variant="secondary" onClick={() => setExportDialogOpen(true)}>
                  Export Report
                </Button>
                <Button onClick={() => setNewTxDialogOpen(true)}>
                  + New Transaction
                </Button>
              </div>
            </div>

            <div className="metrics-grid">
              <MetricCard label="Total Balance" value="$2.4M" change="+12.5% vs last month" positive={true} />
              <MetricCard label="Monthly Revenue" value="$847K" change="+8.2% vs last month" positive={true} />
              <MetricCard label="Active Users" value="12,847" change="+3.1% vs last month" positive={true} />
              <MetricCard label="Transactions Today" value="1,284" change="-2.4% vs yesterday" positive={false} />
            </div>

            <div className="dashboard-grid">
              <div className="card">
                <div className="card-header">
                  <h2 className="card-title">Monthly Revenue - 2026</h2>
                  <Tag type="info">YTD: $9.64M</Tag>
                </div>
                <RevenueChart />
              </div>
              <div className="card">
                <div className="card-header">
                  <h2 className="card-title">Recent Activity</h2>
                  <Button variant="ghost" size="small">View all</Button>
                </div>
                <RecentActivity />
              </div>
            </div>

            <div className="card">
              <div className="card-header">
                <h2 className="card-title">Transactions</h2>
                <Tag>{filteredTransactions.length} results</Tag>
              </div>

              <div className="tab-nav">
                <button className={`tab-btn ${activeTab === 'all' ? 'active' : ''}`} onClick={() => setActiveTab('all')}>All</button>
                <button className={`tab-btn ${activeTab === 'completed' ? 'active' : ''}`} onClick={() => setActiveTab('completed')}>Completed</button>
                <button className={`tab-btn ${activeTab === 'pending' ? 'active' : ''}`} onClick={() => setActiveTab('pending')}>Pending</button>
                <button className={`tab-btn ${activeTab === 'failed' ? 'active' : ''}`} onClick={() => setActiveTab('failed')}>Failed</button>
              </div>

              <div className="filters-row">
                <input
                  type="text"
                  className="search-input"
                  placeholder="Search by user or ID..."
                  value={searchValue}
                  onChange={(e) => setSearchValue(e.target.value)}
                />
              </div>

              <div style={{ height: 480 }}>
                <AgGrid
                  rowData={filteredTransactions}
                  columnDefs={columnDefs}
                  height={480}
                  rowHeight={56}
                  defaultColDef={{ sortable: true, resizable: true }}
                />
              </div>
            </div>
          </main>

          <ExportModal open={exportDialogOpen} onClose={() => setExportDialogOpen(false)} />
          <NewTransactionModal open={newTxDialogOpen} onClose={() => setNewTxDialogOpen(false)} />
        </>
      );
    }

    createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
