<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Dashboard — prototype</title>
  <link rel="stylesheet" href="../vendor/alix-ui.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31/dist/ag-grid-community.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    /* =================================================================
       AlixPartners Platforms Design System — resolved tokens
       File: https://www.figma.com/design/uKDQ4UPs40MQXxn6CrcqTO/Platforms-Design-System
       Mirrored from values in @alixpartners/ui-components (vendor/alix-ui.css)
       ================================================================= */
    :root {
      --ap-font:        Roboto, sans-serif;

      --ap-bg-page:     #f1f1f1;
      --ap-bg-surface:  #ffffff;
      --ap-bg-subtle:   #fafafa;
      --ap-bg-muted:    #f5f5f5;

      --ap-text:        #28292c;
      --ap-text-2:      #4a4a4a;
      --ap-text-muted:  #727272;
      --ap-text-soft:   #878787;

      --ap-border:      #cccccc;
      --ap-border-soft: #e6e6e6;

      --ap-primary:     #024870;
      --ap-primary-2:   #0369a3;

      --ap-success:     #498e2b;
      --ap-success-2:   #3f7b25;
      --ap-success-bg:  #dff0db;

      --ap-error:       #cb282e;
      --ap-error-2:     #ac272c;
      --ap-error-bg:    #f99397;

      --ap-warning:     #ce7309;
      --ap-warning-bg:  #fbe7c4;

      --ap-radius-sm:   2px;
      --ap-radius:      4px;
      --ap-radius-md:   6px;
      --ap-radius-lg:   8px;

      --ap-space-1:     4px;
      --ap-space-2:     8px;
      --ap-space-3:     12px;
      --ap-space-4:     16px;
      --ap-space-5:     20px;
      --ap-space-6:     24px;
      --ap-space-8:     32px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--ap-font);
      font-size: 14px;
      line-height: 1.45;
      background: var(--ap-bg-page);
      color: var(--ap-text);
      -webkit-font-smoothing: antialiased;
    }
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 0 var(--ap-space-6) var(--ap-space-8); }

    /* ---------- page header ---------- */
    .page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: var(--ap-space-3) var(--ap-space-4);
      margin: var(--ap-space-6) 0 var(--ap-space-5);
    }
    .page-header__title { min-width: 0; }
    .page-header__title h1 {
      margin: 0;
      font-size: 24px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2;
      color: var(--ap-text);
    }
    .page-header__title .title-row {
      display: flex; align-items: center; gap: var(--ap-space-2); flex-wrap: wrap;
    }
    .page-header__title .meta-row {
      margin: 6px 0 0;
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--ap-space-2);
      color: var(--ap-text-muted); font-size: 13px;
    }
    .page-header__title .meta-row .date {
      color: var(--ap-text-2);
      font-weight: 500;
    }
    .page-header__title .meta-row .metric {
      color: var(--ap-text-muted);
    }
    .page-header__title .meta-row .sep { color: var(--ap-border); }
    .page-header__actions {
      display: flex; align-items: flex-end; gap: var(--ap-space-2);
      flex-wrap: wrap; justify-content: flex-end;
    }
    /* Datepicker reserves a 16px helperRow under the input for error/help text;
       suppress it in the page header so the input bottom aligns with the button bottom. */
    .page-header__actions [class*="Datepicker-module__helperRow"] { display: none; }

    /* status pill in the page-header subtitle (replaces full-width banner) */
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px;
      background: var(--ap-bg-muted);
      border: 1px solid var(--ap-border);
      border-radius: 240px;
      font-size: 12px; font-weight: 500;
      color: var(--ap-text-2);
      font-family: var(--ap-font);
      line-height: 18px;
    }
    .status-pill::before {
      content: ""; width: 8px; height: 8px; border-radius: 999px; display: inline-block;
      background: var(--ap-text-soft);
    }
    .status-pill--success::before { background: var(--ap-success); }
    .status-pill--warning::before { background: var(--ap-warning); }
    .status-pill--error::before   { background: var(--ap-error); }

    /* ---------- filter row (table-scoped) ---------- */
    .filter-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) minmax(180px, 1fr) minmax(180px, 1fr) auto;
      gap: var(--ap-space-3);
      align-items: end;
      margin: var(--ap-space-3) 0 var(--ap-space-4);
      padding: var(--ap-space-3) var(--ap-space-4);
      background: var(--ap-bg-surface);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius);
    }
    .filter-row > * { min-width: 0; }
    .filter-row .toggle-cell { padding-bottom: 6px; }

    /* ---------- KPI ---------- */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--ap-space-4); margin: 0 0 var(--ap-space-6);
    }
    .kpi-card {
      background: var(--ap-bg-surface);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius);
      padding: var(--ap-space-4);
      display: flex; flex-direction: column; gap: var(--ap-space-2);
      min-width: 0;
    }
    .kpi-label { display: flex; gap: 6px; align-items: center; color: var(--ap-text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .kpi-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1.15; color: var(--ap-text); }
    .kpi-delta { display: flex; align-items: center; gap: var(--ap-space-2); flex-wrap: wrap; }
    .kpi-delta > * { white-space: nowrap; }

    /* ---------- panels ---------- */
    .panel {
      background: var(--ap-bg-surface);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius);
      padding: var(--ap-space-4);
      min-width: 0;
      overflow: hidden;
    }
    .panel + .panel, .panel-stack > * + * { margin-top: var(--ap-space-4); }
    .panel-stack { min-width: 0; }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--ap-space-3); flex-wrap: wrap;
      margin-bottom: var(--ap-space-3);
    }
    .panel h2 {
      margin: 0 0 var(--ap-space-3);
      font-size: 13px; font-weight: 600; line-height: 1;
      display: flex; align-items: center; gap: 8px;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--ap-text-2);
    }
    .panel-head h2 { margin: 0; }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 2.1fr) minmax(300px, 1fr);
      gap: var(--ap-space-6); align-items: start;
      margin-top: var(--ap-space-4);
    }
    .filter-row + .main-grid { margin-top: 0; }
    .sidebar { display: flex; flex-direction: column; gap: var(--ap-space-4); position: sticky; top: var(--ap-space-4); }
    .stack-md > * + * { margin-top: var(--ap-space-3); }
    .stack-sm > * + * { margin-top: var(--ap-space-2); }

    /* ---------- movers ---------- */
    .movers { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: var(--ap-space-4); min-width: 0; overflow: hidden; }
    .movers > div { min-width: 0; overflow: hidden; }
    .movers .col-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--ap-space-2); }
    .movers .col-head strong { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .movers .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--ap-space-2) 0;
      border-bottom: 1px solid var(--ap-border-soft);
      min-width: 0;
    }
    .movers .row > div { min-width: 0; }
    .movers .row:last-child { border-bottom: none; }
    .sym { font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: .02em; font-size: 13px; color: var(--ap-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .qty { color: var(--ap-text-muted); font-size: 12px; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---------- positions table (AG Grid) ---------- */
    .pl-pos { color: var(--ap-success-2); font-weight: 600; font-variant-numeric: tabular-nums; }
    .pl-neg { color: var(--ap-error-2);   font-weight: 600; font-variant-numeric: tabular-nums; }
    .pl-sub { display: block; font-size: 11px; color: var(--ap-text-muted); font-weight: 500; }
    .sector-chip {
      display: inline-flex; align-items: center; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: var(--ap-radius-sm); line-height: 18px;
      font-family: var(--ap-font);
    }
    .view-link {
      appearance: none; background: transparent; border: none; cursor: pointer;
      color: var(--ap-primary-2);
      font: 600 12px/1 var(--ap-font);
      padding: 4px 8px; border-radius: var(--ap-radius);
    }
    .view-link:hover { background: var(--ap-bg-muted); text-decoration: underline; }
    /* AG Grid mobile note: AG Grid horizontal-scrolls at narrow widths instead of
       linearizing into cards. Users scroll the grid horizontally on phones. */

    /* ---------- AG Grid — align with DS tokens ---------- */
    .ag-theme-quartz {
      --ag-font-family: var(--ap-font);
      --ag-font-size: 13px;
      --ag-foreground-color: var(--ap-text);
      --ag-background-color: var(--ap-bg-surface);
      --ag-header-foreground-color: var(--ap-text-2);
      --ag-header-background-color: var(--ap-bg-muted);
      --ag-odd-row-background-color: var(--ap-bg-surface);
      --ag-row-hover-color: var(--ap-bg-muted);
      --ag-border-color: var(--ap-border-soft);
      --ag-row-border-color: var(--ap-border-soft);
      --ag-header-column-separator-color: var(--ap-border);
      --ag-selected-row-background-color: rgba(2,72,112,0.06);
      --ag-control-panel-background-color: var(--ap-bg-surface);
      --ag-border-radius: var(--ap-radius);
      --ag-cell-horizontal-padding: var(--ap-space-3);
      width: 100%;
      min-width: 0;
    }
    .ag-theme-quartz .ag-root-wrapper {
      min-width: 0;
      overflow: hidden;
    }
    .ag-theme-quartz .ag-header-cell-text {
      font-weight: 600; text-transform: uppercase; letter-spacing: .04em; font-size: 11px;
    }

    /* ---------- summary strip (positions / trades) ---------- */
    .summary-strip {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--ap-space-3);
      margin-bottom: var(--ap-space-4);
    }
    .summary-card {
      padding: var(--ap-space-3) var(--ap-space-4);
      border: 1px solid var(--ap-border);
      border-radius: var(--ap-radius);
      background: var(--ap-bg-surface);
      min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .summary-label { font-size: 10px; color: var(--ap-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .summary-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; line-height: 1.2; color: var(--ap-text); }
    .summary-sub { font-size: 11px; color: var(--ap-text-muted); font-variant-numeric: tabular-nums; }

    /* ---------- trade side / status chips ---------- */
    .side-chip {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: var(--ap-radius-sm); line-height: 18px; letter-spacing: .04em;
      font-family: var(--ap-font);
    }
    .side-buy   { background: var(--ap-success-bg); color: var(--ap-success-2); }
    .side-sell  { background: var(--ap-error-bg);   color: var(--ap-error-2); }
    .side-short { background: var(--ap-warning-bg); color: var(--ap-warning); }
    .side-cover { background: #d6e4ee;              color: var(--ap-primary); }
    .status-dot {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; color: var(--ap-text-2);
      font-family: var(--ap-font);
    }
    .status-dot::before {
      content: ""; width: 8px; height: 8px; border-radius: 999px; display: inline-block;
    }
    .status-filled::before    { background: var(--ap-success); }
    .status-partial::before   { background: var(--ap-warning); }
    .status-pending::before   { background: var(--ap-text-soft); }
    .status-cancelled::before { background: var(--ap-border); }

    /* ---------- table-row controls block ---------- */
    .table-controls { display: flex; gap: var(--ap-space-4); align-items: center; flex-wrap: wrap; }
    .table-controls > * { white-space: nowrap; }

    /* ---------- allocations ---------- */
    .alloc-list { display: flex; flex-direction: column; gap: var(--ap-space-2); }
    .alloc-row {
      display: grid;
      grid-template-columns: minmax(140px, 1.2fr) minmax(160px, 2fr) 56px 64px 80px 90px;
      align-items: center;
      gap: var(--ap-space-3);
      padding: var(--ap-space-2) 0;
      border-bottom: 1px solid var(--ap-border-soft);
    }
    .alloc-row:last-child { border-bottom: none; }
    .alloc-row__name { font-weight: 600; color: var(--ap-text); font-size: 13px; min-width: 0; }
    .alloc-row__sub  { font-weight: 400; color: var(--ap-text-muted); font-size: 11px; margin-top: 2px; }
    .alloc-row__num  { text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; color: var(--ap-text); }

    .alloc-bar {
      position: relative; height: 8px; width: 100%;
      background: var(--ap-bg-muted); border-radius: 999px; overflow: hidden;
    }
    .alloc-bar__fill {
      position: absolute; top: 0; left: 0; height: 100%;
      background: var(--ap-primary-2); border-radius: 999px;
    }
    .alloc-bar__fill--over  { background: var(--ap-warning); }
    .alloc-bar__fill--under { background: var(--ap-text-soft); }
    .alloc-bar__target {
      position: absolute; top: -2px; bottom: -2px; width: 2px;
      background: var(--ap-text); border-radius: 1px;
    }
    .alloc-tag {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 8px; border-radius: var(--ap-radius-sm);
      font-size: 11px; font-weight: 700; letter-spacing: .04em; line-height: 18px;
      font-family: var(--ap-font); white-space: nowrap;
    }
    .alloc-tag--on    { background: var(--ap-bg-muted);   color: var(--ap-text-2); }
    .alloc-tag--over  { background: var(--ap-warning-bg); color: var(--ap-warning); }
    .alloc-tag--under { background: #d6e4ee;              color: var(--ap-primary); }

    /* sector horizontal bars */
    .sector-list { display: flex; flex-direction: column; gap: var(--ap-space-2); }
    .sector-row {
      display: grid; grid-template-columns: 140px 1fr 56px;
      gap: var(--ap-space-3); align-items: center;
      font-size: 13px;
    }
    .sector-row__bar {
      height: 10px; background: var(--ap-bg-muted); border-radius: var(--ap-radius-sm); overflow: hidden;
    }
    .sector-row__fill {
      height: 100%; background: var(--ap-primary-2); border-radius: var(--ap-radius-sm);
    }
    .sector-row__pct { text-align: right; font-variant-numeric: tabular-nums; color: var(--ap-text); font-weight: 600; }

    /* ---------- stress scenarios (Risk tab) ---------- */
    .stress-list { display: flex; flex-direction: column; gap: var(--ap-space-2); }
    .stress-row {
      display: grid;
      grid-template-columns: minmax(140px, 1.3fr) minmax(120px, 1.5fr) 110px 80px 90px;
      align-items: center;
      gap: var(--ap-space-3);
      padding: var(--ap-space-2) 0;
      border-bottom: 1px solid var(--ap-border-soft);
    }
    .stress-row:last-child { border-bottom: none; }
    .stress-row__name { font-weight: 600; color: var(--ap-text); font-size: 13px; min-width: 0; }
    .stress-row__sub  { font-weight: 400; color: var(--ap-text-muted); font-size: 11px; margin-top: 2px; }
    .stress-bar {
      position: relative; height: 8px; width: 100%;
      background: var(--ap-bg-muted); border-radius: 999px; overflow: hidden;
    }
    .stress-bar__fill {
      position: absolute; top: 0; left: 0; height: 100%;
      border-radius: 999px;
    }
    .stress-bar__fill--info    { background: var(--ap-text-soft); }
    .stress-bar__fill--warning { background: var(--ap-warning); }
    .stress-bar__fill--error   { background: var(--ap-error); }
    @media (max-width: 700px) {
      .stress-row {
        grid-template-columns: 1fr 1fr;
        gap: var(--ap-space-2);
      }
      .stress-row > :nth-child(2) { grid-column: 1 / -1; order: 5; }
    }

    /* ---------- compliance status chips ---------- */
    .cmp-tag {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 8px; border-radius: var(--ap-radius-sm);
      font-size: 11px; font-weight: 700; letter-spacing: .04em; line-height: 18px;
      font-family: var(--ap-font);
    }
    .cmp-tag--pass    { background: var(--ap-success-bg); color: var(--ap-success-2); }
    .cmp-tag--warning { background: var(--ap-warning-bg); color: var(--ap-warning); }
    .cmp-tag--fail    { background: var(--ap-error-bg);   color: var(--ap-error-2); }

    /* ---------- performance attribution bars ---------- */
    .attribution-list { display: flex; flex-direction: column; gap: var(--ap-space-2); }
    .attribution-row {
      display: grid;
      grid-template-columns: 140px 1fr 90px 70px;
      gap: var(--ap-space-3);
      align-items: center;
      padding: var(--ap-space-2) 0;
      border-bottom: 1px solid var(--ap-border-soft);
    }
    .attribution-row:last-child { border-bottom: none; }
    .attribution-row__name { font-weight: 600; color: var(--ap-text); font-size: 13px; }
    .attribution-bar {
      position: relative; height: 10px; width: 100%;
      background: var(--ap-bg-muted); border-radius: var(--ap-radius-sm); overflow: hidden;
    }
    .attribution-bar__fill {
      position: absolute; top: 0; height: 100%;
      border-radius: var(--ap-radius-sm);
    }
    .attribution-bar__fill--pos { background: var(--ap-success); left: 50%; }
    .attribution-bar__fill--neg { background: var(--ap-error); right: 50%; }
    .attribution-bar__center {
      position: absolute; top: -2px; bottom: -2px; left: 50%;
      width: 2px; background: var(--ap-text-soft); transform: translateX(-50%);
    }

    /* ---------- factor exposure bars (centered at 0) ---------- */
    .factor-list { display: flex; flex-direction: column; gap: var(--ap-space-3); }
    .factor-row {
      display: grid;
      grid-template-columns: 100px 1fr 60px;
      gap: var(--ap-space-3);
      align-items: center;
    }
    .factor-row__label { font-size: 13px; font-weight: 500; color: var(--ap-text); }
    .factor-bar {
      position: relative; height: 12px; width: 100%;
      background: var(--ap-bg-muted); border-radius: var(--ap-radius-sm); overflow: visible;
    }
    .factor-bar__fill {
      position: absolute; top: 0; height: 100%;
      border-radius: var(--ap-radius-sm);
    }
    .factor-bar__fill--pos { background: var(--ap-primary-2); left: 50%; }
    .factor-bar__fill--neg { background: var(--ap-warning); right: 50%; }
    .factor-bar__center {
      position: absolute; top: -2px; bottom: -2px; left: 50%;
      width: 2px; background: var(--ap-text); transform: translateX(-50%);
      z-index: 1;
    }
    .factor-row__value {
      text-align: right; font-variant-numeric: tabular-nums;
      font-size: 12px; font-weight: 600; color: var(--ap-text-2);
    }

    @media (max-width: 700px) {
      .alloc-row {
        grid-template-columns: 1fr 1fr;
        gap: var(--ap-space-2);
      }
      .alloc-row > :nth-child(2) { grid-column: 1 / -1; order: 5; }
      .sector-row { grid-template-columns: 100px 1fr 50px; }
    }

    /* ---------- empty / loading / error ---------- */
    .empty-state { text-align: center; padding: var(--ap-space-6) var(--ap-space-4); }
    .empty-state h3 { margin: var(--ap-space-3) 0 4px; font-size: 16px; color: var(--ap-text); font-weight: 600; }
    .empty-state p { color: var(--ap-text-muted); margin: 0 0 var(--ap-space-4); }
    .empty-state .cta { display: inline-flex; justify-content: center; }
    .loading-state {
      display: flex; gap: var(--ap-space-3); align-items: center; justify-content: center;
      padding: 40px; color: var(--ap-text-muted);
    }

    .design-badge {
      position: fixed; bottom: var(--ap-space-3); right: var(--ap-space-3);
      font: 600 11px/1 var(--ap-font);
      padding: 6px 10px;
      background: var(--ap-text); color: #fff;
      border-radius: var(--ap-radius);
      z-index: 50;
    }

    /* ---------- AI sidebar ---------- */
    .ai-fab {
      position: fixed;
      bottom: 56px; right: var(--ap-space-3);
      z-index: 55;
      appearance: none; border: none; cursor: pointer;
      background: var(--ap-text); color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font: 600 13px/1 var(--ap-font);
      display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .ai-fab:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(0,0,0,0.22); }

      color: #fff; font-size: 11px; font-weight: 700;
    }

      position: fixed; inset: 0; z-index: 60;
      background: rgba(40, 41, 44, 0.32);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .ai-backdrop--open { opacity: 1; pointer-events: auto; }

    .ai-sidebar {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 420px; max-width: 100vw;
      background: var(--ap-bg-surface);
      border-left: 1px solid var(--ap-border);
      box-shadow: -10px 0 30px rgba(0,0,0,0.10);
      z-index: 65;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      font-family: var(--ap-font);
    }
    .ai-sidebar--open { transform: translateX(0); }

    .ai-sidebar__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--ap-space-3);
      padding: var(--ap-space-4);
      background: var(--ap-text);
      color: #fff;
    }
    .ai-sidebar__title { display: flex; align-items: center; gap: var(--ap-space-3); min-width: 0; }
    .ai-sidebar__avatar {
      width: 36px; height: 36px;
      border-radius: 999px;
      background: linear-gradient(135deg, #5cb335, #0369a3);
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: 700;
      flex: none;
    }
    .ai-sidebar__title strong { display: block; font-size: 14px; line-height: 1.2; }
    .ai-sidebar__sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }

    .ai-sidebar__close-wrap { display: inline-flex; }
    .ai-sidebar__close-wrap [class*="Button-module__btn"],

      color: #fff !important;
      background: transparent !important;
    }
    .ai-sidebar__close-wrap button:hover { background: rgba(255,255,255,0.10) !important; }
    .ai-sidebar__close-wrap [class*="btn-icon"] { color: #fff !important; }

    .ai-sidebar__messages {
      flex: 1; overflow-y: auto;
      padding: var(--ap-space-4);
      display: flex; flex-direction: column; gap: var(--ap-space-3);
      background: var(--ap-bg-page);
    }
    .ai-msg { display: flex; }
    .ai-msg--user { justify-content: flex-end; }
    .ai-msg__bubble {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .ai-msg--assistant .ai-msg__bubble {
      background: var(--ap-bg-surface);
      border: 1px solid var(--ap-border-soft);
      color: var(--ap-text);
      border-top-left-radius: 4px;
    }
    .ai-msg--user .ai-msg__bubble {
      background: var(--ap-primary);
      color: #fff;
      border-top-right-radius: 4px;
    }
    .ai-msg__bubble--typing {
      display: inline-flex; gap: 4px; padding: 14px;
    }
    .ai-msg__bubble--typing span {
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--ap-text-soft);
      animation: ai-bounce 1s infinite;
    }
    .ai-msg__bubble--typing span:nth-child(2) { animation-delay: 0.15s; }
    .ai-msg__bubble--typing span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes ai-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    .ai-suggestions {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: var(--ap-space-2) 0 0;
    }
    /* Make DS Tag clickable as a suggestion chip */
    .ai-suggestion-wrap { cursor: pointer; display: inline-flex; }
    .ai-suggestion-wrap:hover [class*="tag"] { background: var(--ap-bg-muted); }

    .ai-sidebar__inputWrap {
      padding: var(--ap-space-3);
      border-top: 1px solid var(--ap-border-soft);
      background: var(--ap-bg-surface);
    }
    .ai-sidebar__input {
      display: flex; gap: var(--ap-space-2); align-items: flex-end;
    }
    .ai-sidebar__input-field { flex: 1; min-width: 0; }
    /* Suppress the DS Textarea's empty label/error rows in this dense chat layout */
    .ai-sidebar__input-field [class*="Textarea-module__label"]:empty { display: none; }
    .ai-sidebar__input-field [class*="Textarea-module__errorMessage"]:empty { display: none; }
    .ai-sidebar__hint {
      font-size: 11px; color: var(--ap-text-muted);
      margin-top: 6px;
      text-align: center;
    }

    /* ---------- responsive ---------- */
    @media (max-width: 1100px) {
      .filter-row { grid-template-columns: 1fr 1fr; }
      .filter-row .toggle-cell { grid-column: 1 / -1; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
    @media (max-width: 900px) {
      .page-header { grid-template-columns: 1fr; align-items: start; }
      .page-header__actions { justify-content: flex-start; }
      .movers { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .page-wrap { padding: 0 var(--ap-space-3) var(--ap-space-8); }
      .filter-row { grid-template-columns: 1fr; }
      .filter-row .toggle-cell { grid-column: auto; }
      .kpi-grid { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: 1fr; }
      .page-header__actions > * { flex: 1 1 auto; }
    }
    @media (max-width: 400px) {
      .page-header__title h1 { font-size: 20px; }
      .kpi-value { font-size: 20px; }
    }

      const drift     = s.current - s.target;

              <Toggle label="Hide intraday hedges" checked={hideHedges} onChange={(v) => setHideHedges(!!v)} labelPosition="right" />
              <Input
                type="number"
                label="P&L alert threshold ($)"
                value={threshold}
                onChange={setThreshold}
                icon="ap-icon-financial"
                iconPosition="left"
                helpText="Trigger a toast when daily P&L crosses this value."
              />
              <div>
                <div style={{fontSize:11, color:"var(--ap-text-muted)", marginBottom:8, fontWeight:600, textTransform:"uppercase", letterSpacing:".06em"}}>Refresh cadence</div>
                <RadioGroup value={refresh} onChange={setRefresh} orientation="vertical" ariaLabel="Refresh cadence">
                  <Radio label="End of day only" value="eod" />
                  <Radio label="Every 15 minutes" value="15m" />
                  <Radio label="Live (websocket)" value="live" />
                </RadioGroup>
              </div>
            </div>
          </div>

          <div className="panel">
            <h2><Icon icon="ap-icon-bookmark" /> Watchlist</h2>
            <TagsFields
              label="Tracked symbols"
              options={[
                { value: "NVDA",  label: "NVDA" },
                { value: "TSLA",  label: "TSLA" },
                { value: "AAPL",  label: "AAPL" },
                { value: "MSFT",  label: "MSFT" },
                { value: "META",  label: "META" },
                { value: "GOOGL", label: "GOOGL" },
                { value: "SPY",   label: "SPY" },
              ]}
              value={watchlist}
              onChange={setWatchlist}
              multiSelect
              searchable
              searchPlaceholder="Add symbol"
            />
          </div>

          <div className="panel">
            <h2><Icon icon="ap-icon-comment" /> Day notes</h2>
            <div className="stack-md">
              <Creatable
                label="Day tags"
                options={[
                  { value: "volatile",  label: "Volatile" },
                  { value: "earnings",  label: "Earnings week" },
                  { value: "fomc",      label: "FOMC" },
                  { value: "rebalance", label: "Rebalance" },
                ]}
                value={tags}
                onChange={setTags}
                multiSelect
              />
              <Textarea
                label="Notes"
                value={notes}
                onChange={setNotes}
                rows={3}
                placeholder="Anything notable about today's session?"
                fullWidth
                resize="vertical"
              />
            </div>
          </div>

          <Button type="primary" size="md" icon="ap-icon-send" onClick={() => setReportOpen(true)}>
            Send daily report
          </Button>

          <Dialog
            isOpen={reportOpen}
            onClose={() => setReportOpen(false)}
            title="Send daily report"
            description="Email an end-of-day P&L summary with attached CSV to the desk distribution list."
            confirmButtonText="Send report"
            cancelButtonText="Cancel"
            onConfirm={() => { setReportOpen(false); toast.success("Daily report queued for delivery."); }}
            onCancel={() => setReportOpen(false)}
          />
        </aside>
      );
    }

    function Dashboard() {
      const [tab, setTab]               = useState("overview");
      const [date, setDate]             = useState(new Date("2026-05-14T16:00:00Z"));
      const [accounts, setAccounts]     = useState(["all"]);
      const [classes, setClasses]       = useState([]);
      const [closedOnly, setClosedOnly] = useState(false);
      const [search, setSearch]         = useState("");
      const [aiOpen, setAIOpen]         = useState(false);

      return (
        <>
          <NavBar
            projectName="TradingDesk"
            projectLogoIcon="ap-icon-logo-vault"
            activeMenuItemHref="#dashboard"
            menuItems={[
              { label: "Dashboard", href: "#dashboard" },
              { label: "Positions", href: "#positions" },
              { label: "Trades",    href: "#trades" },
              { label: "Reports",   href: "#reports" },
              { label: "Settings",  href: "#settings" },
            ]}
            additionalItems={{
              notifications: {
                count: 3,
                content: (
                  <div style={{padding:12, minWidth:240}}>
                    <strong style={{fontSize:13}}>3 unread alerts</strong>
                    <div style={{fontSize:12, color:"var(--ap-text-muted)", marginTop:4}}>
                      NVDA concentration · Vol rebalance · Risk engine 503
                    </div>
                  </div>
                ),
              },
              userProfile: {
                initials: "JB",
                content: (
                  <div style={{padding:12, minWidth:220}}>
                    <strong>Julian Benitez</strong>
                    <div style={{fontSize:12, color:"var(--ap-text-muted)"}}>jbenitez@alixpartners.com</div>
                    <div style={{marginTop:8}}>
                      <Ghost variant="cancel" icon="ap-icon-logout">Sign out</Ghost>
                    </div>
                  </div>
                ),
              },
            }}
          />

          <div className="page-wrap">
            <header className="page-header">
              <div className="page-header__title">
                <div className="title-row">
                  <h1>Trading Day Summary</h1>
                  <Tag type="basic" structure="border" color="gray" size="sm">
                    <Icon icon="ap-icon-clock" size={12} />
                    Closed 4:00 PM ET
                  </Tag>
                </div>
                <div className="meta-row">
                  <span className="date">Thursday, May 14, 2026</span>
                  <span className="sep">·</span>
                  <span className="metric">142 trades</span>
                  <span className="sep">·</span>
                  <span className="metric">24 positions</span>
                </div>
              </div>
              <div className="page-header__actions">
                <Datepicker
                  label=""
                  value={date}
                  onChange={(d) => d && setDate(d)}
                  dateFormat="Mon DD, YYYY"
                />
                <SplitButton
                  type="primary"
                  trigger="split"
                  size="md"
                  buttonLabel="Export EOD"
                  actionOptions={EXPORT_ACTIONS}
                />
              </div>
            </header>

            <TabNavigation align="left">
              <Tab label="Overview"    active={tab === "overview"}    onClick={() => setTab("overview")} />
              <Tab label="Positions"   numberCount={POSITIONS_FULL.length} active={tab === "positions"}   onClick={() => setTab("positions")} />
              <Tab label="Trades"      numberCount={TRADES.length}         active={tab === "trades"}      onClick={() => setTab("trades")} />
              <Tab label="Allocations" numberCount={SLEEVES.length} active={tab === "allocations"} onClick={() => setTab("allocations")} />
              <Tab label="Performance" active={tab === "performance"} onClick={() => setTab("performance")} />
              <Tab label="Risk"        numberCount={STRESS_SCENARIOS.filter(s => s.severity === "error").length} active={tab === "risk"} onClick={() => setTab("risk")} />
              <Tab label="Compliance"  hasError numberCount={COMPLIANCE_RULES.filter(r => r.status === "fail").length} active={tab === "compliance"} onClick={() => setTab("compliance")} />
            </TabNavigation>

            {(tab === "overview" || tab === "positions" || tab === "trades" || tab === "risk" || tab === "performance") && (
              <div className="filter-row">
                <Search
                  value={search}
                  onChange={setSearch}
                  placeholder="Find symbol or strategy"
                  label="Search"
                />
                <Dropdown
                  label="Account"
                  options={ACCOUNT_OPTIONS}
                  value={accounts}
                  onChange={setAccounts}
                  placeholder="All accounts"
                />
                <Dropdown
                  label="Asset class"
                  options={ASSET_CLASS_OPTIONS}
                  value={classes}
                  onChange={setClasses}
                  placeholder="All asset classes"
                  multiSelect
                  searchable
                />
                <div className="toggle-cell">
                  <Toggle
                    label="Closed only"
                    checked={closedOnly}
                    onChange={(v) => setClosedOnly(!!v)}
                    labelPosition="right"
                  />
                </div>
              </div>
            )}

            <div className="main-grid">
              <div className="panel-stack">
                {tab === "overview"    && <><MoversPanel /><PositionsTable /></>}
                {tab === "positions"   && <PositionsView />}
                {tab === "trades"      && <TradesBlotter />}
                {tab === "allocations" && <AllocationsView />}
                {tab === "performance" && <PerformanceView />}
                {tab === "risk"        && <RiskView />}
                {tab === "compliance"  && <ComplianceView />}
              </div>
              <SidebarPanel tab={tab} />
            </div>
          </div>

          {!aiOpen && (
            <button className="ai-fab" onClick={() => setAIOpen(true)} aria-label="Open trading assistant">
              <span className="ai-fab__sparkle">AI</span>
              <span>Ask assistant</span>
            </button>
          )}
          <AISidebar open={aiOpen} onClose={() => setAIOpen(false)} />
        </>
      );
    }

    // ----------- AI sidebar (mocked) -----------
    const SUGGESTED_PROMPTS = [
      "Summarize today's P&L",
      "Why is NVDA flagged?",
      "Top compliance failures",
      "Should I rebalance?",
    ];

    function mockAIResponse(userText) {
      const t = userText.toLowerCase();
      if (/\b(hi|hello|hey)\b/.test(t)) {
        return "Hi Julian — EOD reconciliation finished at 4:18 PM. Ask me about P&L, positions, trades, compliance, or allocations.";
      }
      if (/p&?l|pnl|profit/.test(t) || /summari[sz]e today/.test(t)) {
        return "Daily P&L is +$248,420 (+1.84%).\n\nTop contributors:\n• NVDA  +$49,952 (+3.87%)\n• TSLA  +$3,895 (+2.35%)\n• AMD   +$1,848 (+2.47%)\n\nDrags:\n• META  −$1,830 (−1.20%)\n• JPM   −$700 (−0.71%)\n\n64% of closed positions ended green.";
      }
      if (/nvda/.test(t)) {
        return "NVDA — long 1,400 sh at $920.42 avg, marked $956.10.\nUnrealized P&L: +$49,952 (+3.87%), market value $1.34M.\n\nHeads-up: NVDA is 27.1% of NAV — above the 25% concentration cap (compliance rule C-201 is currently failing).";
      }
      if (/trade|fill|execut/.test(t)) {
        return "142 fills today across 4 accounts.\n• Notional volume ~$2.86M\n• Avg fill size ~$20k\n• 17 partial · 1 pending (HD short) · 1 cancelled (XOM)\n\nLargest fill: NVDA +200 sh @ $956.10 (F-10314) at 15:58 ET.";
      }
      if (/compl|risk|violat|fail/.test(t) || /flag/.test(t)) {
        return "2 compliance failures right now:\n\n• C-201  Single position concentration\n   27.1% (NVDA) vs cap 25% NAV\n\n• C-210  Risk engine connectivity\n   503 — checks stale 18m\n\nAlso watching:\n• C-209  Counterparty limits — warning ($3.2M / $5M cap)";
      }
      if (/position/.test(t)) {
        return "23 open positions today (17 long, 6 short).\n\n• Gross exposure $4.21M\n• Net exposure 62% gross\n• Largest position: NVDA at $1.34M MV (27% of gross)\n• 19 positions in profit, 4 in the red";
      }
      if (/alloc|sleeve|rebalanc/.test(t)) {
        return "Sleeve drift vs target:\n• Core Long Equity   53.2%  (target 50,  +3.2 pp over)\n• Hedge Overlay      19.5%  (target 20,  on target)\n• Macro Discretionary 14.1% (target 15,  −0.9 pp under)\n• Cash & Equivalents  8.4%  (target 10,  −1.6 pp under)\n• Special Situations  4.8%  (target 5,   on target)\n\nA gentle Core → Cash trim of ~$1.3M would bring both back to target.";
      }
      if (/expor|report|csv|email|send/.test(t)) {
        return "I can queue the EOD report for delivery. Want me to attach the trade blotter (142 fills) and the failing-rule detail, or send just the headline P&L summary?";
      }
      if (/\bwhy\b/.test(t)) {
        return "Quick read on today: tech rallied (NVDA +3.87%, AMD +2.47%) which pulled the Core sleeve over its 50% target. Risk-off names (JPM, BAC) underperformed, but the hedge overlay offset most of the drag. Net result: +$248k vs a flat tape.";
      }
      return "I don't have a confident read on that one. Try asking about NVDA, today's P&L, trades, compliance, or sleeve allocations. Or click one of the suggestions above.";
    }

    function AISidebar({ open, onClose }) {
      const [messages, setMessages] = useState([
        { role: "assistant", text: "Hi Julian — EOD reconciliation finished at 4:18 PM. Ask me about P&L, positions, trades, compliance, or allocations." },
      ]);
      const [input, setInput] = useState("");
      const [pending, setPending] = useState(false);
      const listRef = useRef(null);

      useEffect(() => {
        if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
      }, [messages, pending]);

      useEffect(() => {
        if (!open) return;
        const t = setTimeout(() => {
          const ta = document.querySelector(".ai-sidebar__input-field textarea");
          if (ta) ta.focus();
        }, 220);
        return () => clearTimeout(t);
      }, [open]);

      const sendText = (raw) => {
        const text = raw.trim();
        if (!text || pending) return;
        setMessages((m) => [...m, { role: "user", text }]);
        setInput("");
        setPending(true);
        const delay = 550 + Math.random() * 650;
        setTimeout(() => {
          setMessages((m) => [...m, { role: "assistant", text: mockAIResponse(text) }]);
          setPending(false);
        }, delay);
      };

      const onKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendText(input);
        }
      };

      return (
        <>
          <div className={"ai-backdrop " + (open ? "ai-backdrop--open" : "")} onClick={onClose} aria-hidden />
          <aside className={"ai-sidebar " + (open ? "ai-sidebar--open" : "")} aria-label="AI trading assistant" aria-hidden={!open}>
            <div className="ai-sidebar__head">
              <div className="ai-sidebar__title">
                <div className="ai-sidebar__avatar">AI</div>
                <div>
                  <strong>Trading Assistant</strong>
                  <div className="ai-sidebar__sub">Mocked LLM · prototype only</div>
                </div>
              </div>
              <span className="ai-sidebar__close-wrap" onClick={onClose}>
                <Ghost variant="default" icon="ap-icon-close" noIcon={false} aria-label="Close AI assistant" />
              </span>
            </div>

            <div className="ai-sidebar__messages" ref={listRef}>
              {messages.map((m, i) => (
                <div key={i} className={"ai-msg ai-msg--" + m.role}>
                  <div className="ai-msg__bubble">{m.text}</div>
                </div>
              ))}
              {pending && (
                <div className="ai-msg ai-msg--assistant">
                  <div className="ai-msg__bubble ai-msg__bubble--typing">
                    <span /><span /><span />
                  </div>
                </div>
              )}
              {messages.length <= 1 && !pending && (
                <div className="ai-suggestions">
                  {SUGGESTED_PROMPTS.map((p) => (
                    <span key={p} className="ai-suggestion-wrap" onClick={() => sendText(p)}>
                      <Tag type="basic" structure="border" color="gray" size="sm" label={p} noIcon />
                    </span>
                  ))}
                </div>
              )}
            </div>

            <div className="ai-sidebar__inputWrap">
              <div className="ai-sidebar__input">
                <div className="ai-sidebar__input-field">
                  <Textarea
                    label=""
                    value={input}
                    onChange={setInput}
                    placeholder="Ask about positions, P&L, NVDA, compliance…"
                    rows={2}
                    fullWidth
                    resize="none"
                    disabled={pending}
                    onKeyDown={onKey}
                  />
                </div>
                <Button
                  type="primary"
                  size="md"
                  icon="ap-icon-right"
                  loading={pending}
                  disabled={!input.trim() || pending}
                  onClick={() => sendText(input)}
                  aria-label="Send"
                />
              </div>
              <div className="ai-sidebar__hint">Enter to send · Shift+Enter for a new line</div>
            </div>
          </aside>
        </>
      );
    }

    class Boundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(err) { return { err }; }
      componentDidCatch(err, info) { console.error("Boundary caught:", err, info); }
      render() {
        if (this.state.err) {
          return (
            <div style={{margin:"24px", padding:"16px", background:"#fef2f2", border:"1px solid var(--ap-error)", borderRadius:"var(--ap-radius)", color:"var(--ap-error-2)", fontFamily:"var(--ap-font)"}}>
              <strong>Render error:</strong>
              <pre style={{whiteSpace:"pre-wrap", margin:"8px 0 0"}}>{this.state.err.message}{"\n\n"}{this.state.err.stack}</pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      return (
        <Boundary>
          <ToastProvider maxSnack={3} autoHideDuration={4000} anchorOrigin={{ vertical: "bottom", horizontal: "right" }}>
            <Dashboard />
          </ToastProvider>
        </Boundary>
      );
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
